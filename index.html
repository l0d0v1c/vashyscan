<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vashy — équations découvertes</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --line:#262b36; --ink:#e6e9ef; --muted:#8b93a3;
    --accent:#5fb3f6; --connue:#1f6f43; --connue-bg:#12271c;
    --mono:"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:20px 24px;border-bottom:1px solid var(--line);
         background:linear-gradient(180deg,#1a1e27,#12151c)}
  h1{margin:0;font-size:20px;letter-spacing:.2px}
  h1 span{color:var(--accent)}
  .sub{color:var(--muted);margin-top:4px;font-size:13px}
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;
            padding:14px 24px;border-bottom:1px solid var(--line);background:var(--panel)}
  input,select{background:#0d0f14;color:var(--ink);border:1px solid var(--line);
               border-radius:8px;padding:8px 10px;font-size:13px}
  input#q{min-width:280px;flex:1}
  .count{color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums}
  .count b{color:var(--ink)}

  .wrap{overflow:auto;max-height:calc(100vh - 150px)}
  table{border-collapse:collapse;table-layout:fixed;font-size:13px}
  th,td{padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);
        text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:top}
  thead th{position:sticky;top:0;background:#1b1f28;cursor:pointer;user-select:none;z-index:2;font-weight:600}
  thead th:hover{color:var(--accent)}
  th.sorted{color:var(--accent)}
  th .arrow{color:var(--accent)}
  tbody tr:hover{background:#1c2029}
  tr.connue{background:var(--connue-bg)}
  tr.connue:hover{background:#173023}
  td.commentaire{white-space:normal;color:#c7cddb}
  td.mono,.mono{font-family:var(--mono);font-size:12.5px}
  td.equation,td.pi{font-family:var(--mono);color:#d7e3f4}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .b-connue{background:var(--connue);color:#d7ffe8}
  .b-inconnue{background:#2a2f3a;color:var(--muted)}
  code{font-family:var(--mono);color:#f0c674}

  .resizer{position:absolute;top:0;right:0;width:7px;height:100%;cursor:col-resize;
           z-index:3}
  .resizer:hover,.resizer.active{background:var(--accent)}

  tbody tr{cursor:pointer}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;
           align-items:center;justify-content:center;z-index:50;padding:24px}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;
         max-width:660px;width:100%;max-height:85vh;overflow:auto;padding:24px 26px;
         box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .modal .x{float:right;cursor:pointer;color:var(--muted);font-size:24px;line-height:1;
            border:none;background:none;padding:0}
  .modal .x:hover{color:var(--ink)}
  .modal .eq{font-family:var(--mono);font-size:22px;color:#d7e3f4;margin:2px 0 6px;
             word-break:break-word}
  .modal .pistr{font-family:var(--mono);color:var(--muted);font-size:13px;margin-bottom:16px}
  .modal .meta{display:flex;flex-wrap:wrap;gap:8px 18px;color:var(--muted);
               font-size:12.5px;margin:0 0 18px;align-items:center}
  .modal .meta b{color:var(--ink)}
  .modal h3{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .modal .comment{background:#0d0f14;border:1px solid var(--line);border-radius:10px;
                  padding:14px 16px;line-height:1.65;color:#e2e6ef;white-space:pre-wrap}
</style>
</head>
<body>
<header>
  <h1><span>Vashy</span> — catalogue des équations découvertes</h1>
  <div class="sub">3&nbsp;570 formes dimensionnelles distinctes (taille ≤ 4), identifiées par LLM.
     <code>identification</code> = entier séquentiel en base64. Glisse le bord droit d'un en-tête pour redimensionner.</div>
</header>

<div class="controls">
  <input id="q" placeholder="Recherche (équation, nom, commentaire, π…)">
  <select id="statut"><option value="">tous statuts</option>
    <option value="connue">connue</option><option value="inconnue">inconnue</option></select>
  <select id="domain"><option value="">tous domaines</option></select>
  <select id="size"><option value="">toutes tailles</option></select>
  <span class="count" id="count"></span>
</div>

<div class="wrap"><table id="tbl">
  <colgroup id="cols"></colgroup>
  <thead><tr id="head"></tr></thead>
  <tbody id="body"></tbody>
</table></div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script src="data.js"></script>
<script>
const NUMERIC = new Set(["size","n_const","n_domains","max_exp","exp_l1","complexity","score"]);
const SEARCH_FIELDS = ["equation","pi","nom","commentaire","symbols","domains","name","statut"];
const WIDTHS = { identification:110, size:60, keys:170, symbols:130, domains:120, pi:160,
  equation:200, name:210, n_const:80, n_domains:90, max_exp:80, exp_l1:70,
  complexity:90, score:70, plausible:80, exponents:210, statut:95, nom:230, commentaire:420 };
let sortCol = "score", sortAsc = false;
let currentRows = [];

const table = document.getElementById("tbl");
const colgroup = document.getElementById("cols");
const head = document.getElementById("head");
const domSel = document.getElementById("domain"), szSel = document.getElementById("size");

// filters
[...new Set(DATA.map(r=>r.domains))].sort().forEach(d=>{
  const o=document.createElement("option");o.value=d;o.textContent=d;domSel.appendChild(o);});
[...new Set(DATA.map(r=>r.size))].sort((a,b)=>a-b).forEach(s=>{
  const o=document.createElement("option");o.value=s;o.textContent="taille "+s;szSel.appendChild(o);});

// colgroup + resizable header
const colW = COLUMNS.map(c => WIDTHS[c] || 100);
function syncWidths(){
  COLUMNS.forEach((c,i)=>{ colgroup.children[i].style.width = colW[i]+"px"; });
  table.style.width = colW.reduce((a,b)=>a+b,0)+"px";
}
COLUMNS.forEach((c,i)=>{
  const col=document.createElement("col"); colgroup.appendChild(col);
  const th=document.createElement("th"); th.style.position="sticky";
  th.dataset.col=c;
  th.innerHTML=`<span class="lbl">${c}</span><span class="arrow"></span>`;
  th.onclick=()=>{ if(sortCol===c) sortAsc=!sortAsc; else {sortCol=c; sortAsc=true;} render(); };
  const rz=document.createElement("div"); rz.className="resizer";
  rz.addEventListener("click",e=>e.stopPropagation());
  rz.addEventListener("mousedown",e=>{
    e.stopPropagation(); e.preventDefault();
    rz.classList.add("active");
    const startX=e.clientX, startW=colW[i];
    const move=ev=>{ colW[i]=Math.max(40, startW+(ev.clientX-startX)); syncWidths(); };
    const up=()=>{ rz.classList.remove("active");
      document.removeEventListener("mousemove",move);
      document.removeEventListener("mouseup",up); document.body.style.cursor=""; };
    document.body.style.cursor="col-resize";
    document.addEventListener("mousemove",move);
    document.addEventListener("mouseup",up);
  });
  th.appendChild(rz);
  head.appendChild(th);
});
syncWidths();

function fmt(col,v){
  if(v===null||v===undefined)return "";
  if(col==="plausible")return v? "✓":"·";
  if(col==="statut")return `<span class="badge ${v==="connue"?"b-connue":"b-inconnue"}">${v}</span>`;
  if(col==="complexity"||col==="score")return Number(v).toFixed(2);
  return String(v);
}
function cls(col){
  if(col==="equation")return "equation";
  if(col==="pi")return "pi";
  if(col==="commentaire")return "commentaire";
  if(["identification","keys","symbols","exponents"].includes(col))return "mono";
  if(NUMERIC.has(col))return "num";
  return "";
}
function esc(s){return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;");}

function render(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const fs=document.getElementById("statut").value, fd=domSel.value, fz=szSel.value;
  let rows=DATA.filter(r=>{
    if(fs && r.statut!==fs)return false;
    if(fd && r.domains!==fd)return false;
    if(fz && String(r.size)!==fz)return false;
    if(q) return SEARCH_FIELDS.some(f=>String(r[f]??"").toLowerCase().includes(q));
    return true;
  });
  const num=NUMERIC.has(sortCol);
  rows.sort((a,b)=>{
    let x=a[sortCol], y=b[sortCol];
    if(num){x=Number(x);y=Number(y);} else {x=String(x??"");y=String(y??"");}
    return (x<y?-1:x>y?1:0)*(sortAsc?1:-1);
  });
  currentRows = rows;
  document.getElementById("body").innerHTML = rows.map((r,i)=>{
    const tds = COLUMNS.map(c=>{
      const raw=r[c]??"";
      return `<td class="${cls(c)}" title="${esc(raw)}">${fmt(c,r[c])}</td>`;
    }).join("");
    return `<tr data-i="${i}" class="${r.statut==="connue"?"connue":""}">${tds}</tr>`;
  }).join("");
  document.querySelectorAll("thead th").forEach(th=>{
    const on=th.dataset.col===sortCol;
    th.classList.toggle("sorted",on);
    th.querySelector(".arrow").textContent = on ? (sortAsc?" ▴":" ▾") : "";
  });
  const nc=rows.filter(r=>r.statut==="connue").length;
  document.getElementById("count").innerHTML=
    `<b>${rows.length.toLocaleString("fr")}</b> lignes · <b>${nc}</b> connues`;
}

["q","statut"].forEach(id=>document.getElementById(id).addEventListener("input",render));
domSel.addEventListener("change",render); szSel.addEventListener("change",render);

// --- detail popup on row click ---
const overlay=document.getElementById("overlay"), modal=document.getElementById("modal");
function closeModal(){ overlay.classList.remove("open"); }
function openModal(r){
  const badge=`<span class="badge ${r.statut==="connue"?"b-connue":"b-inconnue"}">${r.statut||"—"}</span>`;
  modal.innerHTML=`
    <button class="x" title="Fermer">×</button>
    <div class="eq">${esc(r.equation)}</div>
    <div class="pistr">π = ${esc(r.pi)}</div>
    <div class="meta">
      ${badge}
      ${r.nom?`<span><b>${esc(r.nom)}</b></span>`:""}
      <span>taille <b>${r.size}</b></span>
      <span>domaine <b>${esc(r.domains)}</b></span>
      <span>score <b>${Number(r.score).toFixed(2)}</b></span>
      <span>id <b>${esc(r.identification)}</b></span>
    </div>
    <h3>Commentaire</h3>
    <div class="comment">${esc(r.commentaire)||"<i style='color:#8b93a3'>— pas de commentaire —</i>"}</div>`;
  modal.querySelector(".x").onclick=closeModal;
  overlay.classList.add("open");
}
document.getElementById("body").addEventListener("click",e=>{
  const tr=e.target.closest("tr"); if(!tr||!tr.dataset.i)return;
  openModal(currentRows[+tr.dataset.i]);
});
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

render();
</script>
</body>
</html>
